<!DOCTYPE html>
<html>
<head>
  <title>Wardrobe App V1 - Simple & Styled</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 20px auto;
      padding: 10px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    select, input, button {
      margin: 5px 0;
      padding: 5px 10px;
      font-size: 16px;
    }

    #preview, #outfit {
      display: flex;
      flex-wrap: wrap;
      border: 1px solid #ccc;
      padding: 10px;
      margin-bottom: 20px;
      background: #fff;
      border-radius: 5px;
    }

    #preview div {
      margin-right: 10px;
      margin-bottom: 10px;
    }

    img {
      max-width: 80px;
      margin: 5px;
      border-radius: 5px;
      border: 1px solid #ddd;
    }

    #generateBtn, #thumbsUp, #thumbsDown {
      cursor: pointer;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      padding: 10px 15px;
      font-size: 16px;
      margin-right: 5px;
    }

    #thumbsUp {
      background-color: #2196F3;
    }

    #thumbsDown {
      background-color: #f44336;
    }

    button:hover {
      opacity: 0.8;
    }

    h3 {
      margin-bottom: 5px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>Wardrobe App V1 - Simple & Styled</h1>

  <h2>Upload clothing items</h2>
  <p>Select category, then upload images:</p>
  <select id="categorySelect">
    <option value="tops">Tops</option>
    <option value="bottoms">Bottoms</option>
    <option value="accessories">Accessories</option>
  </select>
  <input type="file" id="fileInput" multiple>

  <h2>Your items by category:</h2>
  <div id="preview"></div>

  <h2>Generated Outfit:</h2>
  <div id="outfit"></div>
  <button id="generateBtn">Generate Outfit</button>
  <div style="margin-top:10px;">
    <button id="thumbsUp">👍</button>
    <button id="thumbsDown">👎</button>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const categorySelect = document.getElementById('categorySelect');
    const preview = document.getElementById('preview');
    const generateBtn = document.getElementById('generateBtn');
    const outfitDiv = document.getElementById('outfit');

    const imagesByCategory = { tops: [], bottoms: [], accessories: [] };

    fileInput.addEventListener('change', (e) => {
      const category = categorySelect.value;
      const files = e.target.files;
      for (const file of files) {
        const reader = new FileReader();
        reader.onload = () => {
          imagesByCategory[category].push(reader.result);
          renderPreviews();
        };
        reader.readAsDataURL(file);
      }
      e.target.value = '';
    });

    function renderPreviews() {
      preview.innerHTML = '';
      for (const category in imagesByCategory) {
        const imgs = imagesByCategory[category];
        if (imgs.length === 0) continue;

        const categoryDiv = document.createElement('div');
        const heading = document.createElement('h3');
        heading.textContent = category.charAt(0).toUpperCase() + category.slice(1);
        categoryDiv.appendChild(heading);

        imgs.forEach(src => {
          const img = document.createElement('img');
          img.src = src;
          img.title = category;
          categoryDiv.appendChild(img);
        });

        preview.appendChild(categoryDiv);
      }
    }

    generateBtn.addEventListener('click', () => {
      outfitDiv.innerHTML = '';
      let hasAny = false;
      for (const category in imagesByCategory) {
        const imgs = imagesByCategory[category];
        if (imgs.length === 0) continue;

        hasAny = true;
        const idx = Math.floor(Math.random() * imgs.length);
        const img = document.createElement('img');
        img.src = imgs[idx];
        img.title = category;
        outfitDiv.appendChild(img);
      }
      if (!hasAny) outfitDiv.innerHTML = '<p>No images uploaded.</p>';
    });

    document.getElementById('thumbsUp').addEventListener('click', () => console.log('👍'));
    document.getElementById('thumbsDown').addEventListener('click', () => console.log('👎'));
  </script>
</body>
</html>
